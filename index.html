<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TickerBoard · Display</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="display-screen">

  <div id="empty-state" class="empty-state">
    <div class="empty-glyph">◈</div>
    <p class="empty-title">TICKERBOARD</p>
    <span class="empty-sub">Добавьте тикеры и API-ключ в панели администратора</span>
    <a href="admin.html" class="empty-link">→ Открыть Admin</a>
  </div>

  <div id="ticker-grid" class="ticker-grid hidden"></div>

  <div class="hud-bar">
    <div class="hud-left">
      <span class="hud-dot"></span>
      <span class="hud-label" id="market-session">PRE-MARKET</span>
    </div>
    <div class="hud-center">
      <span id="live-clock">--:--:--</span>
    </div>
    <div class="hud-right">
      <span id="last-update">—</span>
    </div>
  </div>

  <script src="script.js"></script>
  <script>Display.init();</script>
</body>
</html>
