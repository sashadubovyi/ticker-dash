<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TickerBoard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700;900&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="display-screen">

  <!-- Пустое состояние -->
  <div id="empty-state" class="empty-state">
    <div class="empty-glyph">◈</div>
    <p class="empty-title">TICKERBOARD</p>
    <span class="empty-sub" id="empty-msg">Подключение к Firebase…</span>
  </div>

  <!-- Основная сетка тикеров -->
  <div id="ticker-grid" class="ticker-grid" style="display:none;"></div>

  <!-- HUD нижняя строка -->
  <div class="hud-bar">
    <div class="hud-left">
      <span class="hud-dot"></span>
      <span class="hud-session" id="hud-session">—</span>
    </div>
    <div class="hud-clock" id="live-clock">--:--:--</div>
    <div class="hud-right" id="last-update">—</div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="script.js"></script>
</body>
</html>
